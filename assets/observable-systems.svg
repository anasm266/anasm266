    <circle cx="656" cy="154" r="18" fill="#F59E0B" fill-opacity="0.18" stroke="#F59E0B"/>
    <circle cx="579" cy="188" r="18" fill="#A78BFA" fill-opacity="0.18" stroke="#A78BFA"/>
