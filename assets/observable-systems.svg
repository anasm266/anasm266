<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Observable systems banner</title>
  <desc id="desc">A clean technical banner showing source code, traces, policy, and product signals flowing into reports.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.55" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="lineA" x1="184" y1="74" x2="1015" y2="254" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="330" rx="26" fill="url(#bg)"/>
  <path d="M80 278H1120" stroke="#334155" stroke-width="1"/>
